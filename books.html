<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading — Tripp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body data-page="books">

  <div id="cursor" aria-hidden="true"></div>
  <div id="scroll-progress" aria-hidden="true"></div>

  <nav id="nav">
    <a href="index.html" class="nav-logo">TRIPP<span class="nav-logo-blink">_</span></a>
    <div class="nav-links">
      <a href="books.html"    class="nav-link" data-page="books">Reading</a>
      <a href="games.html"    class="nav-link" data-page="games">Playing</a>
      <a href="projects.html" class="nav-link" data-page="projects">Building</a>
    </div>
  </nav>

  <header class="page-hero">
    <div class="page-inner">
      <h1 class="page-title">READING<span class="blink">_</span></h1>
      <p class="page-meta" id="page-meta"></p>
    </div>
  </header>

  <main>
    <div class="page-inner">

      <div class="section-block">
        <p class="section-label">In Progress</p>
        <div class="shelf-wrap">
          <div class="bookshelf" id="shelf-reading"></div>
          <div class="shelf-plank" id="plank-reading">
            <div class="plank-glow"></div>
          </div>
        </div>
      </div>

      <div class="section-block">
        <p class="section-label">Finished</p>
        <div class="shelf-wrap">
          <div class="bookshelf" id="shelf-finished"></div>
          <div class="shelf-plank" id="plank-finished">
            <div class="plank-glow"></div>
          </div>
        </div>
        <div class="rating-legend" id="rating-legend"></div>
      </div>

    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <span class="footer-sig">Edited by hand. Built with care.</span>
      <nav class="footer-nav">
        <a href="books.html">Reading</a>
        <a href="games.html">Playing</a>
        <a href="projects.html">Building</a>
      </nav>
    </div>
  </footer>

  <script src="js/core.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
